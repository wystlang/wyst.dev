name: Site

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: site-verify-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build, test, and audit
        env:
          WYST_SITE_COMMIT: ${{ github.sha }}
        run: npm run check

      - name: Preserve the exact release artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wyst-site-${{ github.sha }}
          path: dist
          include-hidden-files: true
          if-no-files-found: error
          overwrite: true
          retention-days: 1

  freshness:
    name: Confirm release freshness
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      deploy: ${{ steps.freshness.outputs.deploy }}
    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Refuse a stale main-branch release before entering production
        id: freshness
        shell: bash
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          remote_sha="$(git ls-remote origin refs/heads/main | awk 'NR == 1 { print $1 }')"
          if [[ "$remote_sha" == "$RELEASE_SHA" ]]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping stale release $RELEASE_SHA; main is $remote_sha"
          fi

  deploy:
    name: Deploy production
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && needs.freshness.outputs.deploy == 'true'
    needs:
      - verify
      - freshness
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://wyst.dev
      deployment: true
    concurrency:
      group: wyst-production
      cancel-in-progress: false
    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Reconfirm release freshness after production admission
        shell: bash
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          remote_sha="$(git ls-remote origin refs/heads/main | awk 'NR == 1 { print $1 }')"
          if [[ "$remote_sha" != "$RELEASE_SHA" ]]; then
            echo "::error::Release $RELEASE_SHA became stale while queued; main is $remote_sha"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install locked deployment tooling
        run: npm ci

      - name: Download the verified site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wyst-site-${{ github.sha }}
          path: dist

      - name: Verify the downloaded artifact
        run: npm run verify:build && npm run validate:assets

      - name: Stage, audit, and promote the release
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: node .github/scripts/release.mjs
